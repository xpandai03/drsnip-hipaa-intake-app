# Fly.io deployment config — DrSnip intake form (Phase 1 scaffold).
#
# First-time setup:  fly apps create drsnip-intake-demo
# Set the database:  fly secrets set DATABASE_URL=postgres://...
# Deploy:            fly deploy
#
# Phase 3 — n8n bridge secrets. Set these BEFORE the first deploy that
# includes the bridge code, otherwise the bridge will short-circuit to
# 'failed: bridge disabled' (no harm — submissions still persist; the n8n
# call just doesn't fire).
#
#   fly secrets set \
#     N8N_WEBHOOK_REGISTRATION_URL=https://n8n-drsnip.fly.dev/webhook/custom-registration-6fe129ab \
#     N8N_WEBHOOK_CONSULTATION_URL=https://n8n-drsnip.fly.dev/webhook/custom-consultation-9f872020 \
#     N8N_WEBHOOK_SECRET=<the DRSNIP_WEBHOOK_SECRET value from the n8n side> \
#     N8N_BRIDGE_ENABLED=true \
#     -a drsnip-intake-demo
#
# Kill switch: `N8N_BRIDGE_ENABLED=false` disables every n8n call without a
# redeploy — submissions continue to land in Postgres exactly as before.

app = "drsnip-intake-demo"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

# Runs once per deploy, in a temporary machine inside Fly's network (reaches
# Postgres over .flycast — no tunnel). Applies the SQL migrations + admin
# seed; all steps are idempotent.
[deploy]
  # migrate first (creates users.role via 0007), THEN the idempotent viewer seed
  # which prints a breach-check before its guarded insert. `&&` => seed only runs
  # if migrate succeeds; either failing fails the release (safe).
  release_command = "sh -c 'node dist/migrate.cjs && node dist/seed-viewer.cjs && node dist/admin-ops.cjs'"

[env]
  NODE_ENV = "production"
  PORT = "8080"

# Single web process serving both the SPA and the /api/* routes.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    method = "get"
    path = "/healthz"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
